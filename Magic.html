    <head>
        <title>Magic - Voetbal Spel</title>
        <meta charset="UTF-8">
    
        <style>
            body{
                font-family: Arial;
                background-color: lightblue;
                text-align: center;
            }
    
            h1{
                color: darkblue;
            }
    
            #goal{
                width: 400px;
                height: 200px;
                border: 5px solid white;
                background-color: blue;
                margin: auto;
                position: relative;
            }
    
            #ball{
                font-size: 40px;
                position: absolute;
                bottom: 10px;
                left: 180px;
            }
    
            button{
                padding: 10px 20px;
                font-size: 16px;
                margin-top: 20px;
                cursor: pointer;
            }
    
            #result{
                font-size: 20px;
                margin-top: 15px;
            }
        </style>
    </head>
    
    <body>
    
    <h1>⚽ Penalty Shoot Game ⚽</h1>
    
    <p>Klik op de knop om een penalty te nemen!</p>
    
    <div id="goal">
        <div id="ball">⚽</div>
    </div>
    
    <button onclick="shoot()">Neem een penalty!</button>
    
    <p id="result"></p>
    <p>Score: <span id="score">0</span></p>
    
    <script>
    
    let score = 0;
    
    function shoot(){
    
        let random = Math.random();
    
        if(random > 0.5){
            document.getElementById("result").innerHTML = "GOAL!!! 🥅⚽";
            score++;
        }
        else{
            document.getElementById("result").innerHTML = "De keeper heeft de bal! 🧤";
        }
    
        document.getElementById("score").innerHTML = score;
    }
    
    </script>
    
    <br><br>
    
    <p>
    inspiratie:  
    <a href="https://www.w3schools.com/js/js_random.asp" target="_blank">
    https://www.w3schools.com/js/js_random.asp
    </a>
    </p>
